<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Area | Minggo Playzone</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>

<body>

    <!-- Simple Login Screen -->
    <div id="login-screen" class="login-container">
        <div class="login-box">
            <h2>Admin Login</h2>
            <p>Enter the master PIN to access bookings.</p>
            <input type="password" id="pin-input" placeholder="PIN" />
            <button onclick="checkPin()" class="btn btn-primary">Enter</button>
            <p id="login-error" style="color:red; display:none; margin-top:10px;">Incorrect PIN</p>
            <p style="font-size: 0.8rem; margin-top:15px; color:#666;"></p>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="dashboard" class="dashboard-container" style="display:none;">
        <header class="admin-header">
            <h1>Minggo Admin</h1>
            <a href="/index.html" class="btn btn-outline" target="_blank">View Live Site</a>
        </header>

        <div class="admin-controls"
            style="margin-bottom: 20px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <label tabindex="0" for="admin-date"><strong>Manage Date:</strong></label>
            <input type="date" id="admin-date"
                style="padding: 10px; margin-left: 10px; border-radius: 5px; border: 1px solid #ccc;">
            <label for="show-all-bookings" style="margin-left: 12px;">
                <input type="checkbox" id="show-all-bookings">
                Show all bookings
            </label>
            <button onclick="exportBookingsCsv()" class="btn btn-outline" style="float: right; margin-left: 10px;">Export CSV</button>
            <button onclick="resetDay()" class="btn btn-danger" style="float: right;">Reset This Day</button>
        </div>
        <div class="admin-controls"
            style="margin-bottom: 20px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <strong>Booking Window:</strong>
            <label for="advance-booking-days" style="margin-left: 8px;">Allow booking for next</label>
            <input type="number" id="advance-booking-days" min="1" max="60"
                style="padding: 8px; margin-left: 8px; width: 90px; border-radius: 5px; border: 1px solid #ccc;">
            <span>day(s)</span>
            <button id="save-booking-window-btn" class="btn btn-primary" style="margin-left: 10px;">Save</button>
            <span id="booking-window-message" style="margin-left: 10px; color: #555;"></span>
        </div>
        <div id="new-booking-alert" class="alert-new-booking" style="display: none;"></div>

        <main class="admin-grid">

            <!-- Bookings List -->
            <section class="admin-card">
                <h2>Bookings for <span id="display-date">...</span></h2>
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Children</th>
                                <th>Time</th>
                                <th>Paid</th>
                            </tr>
                        </thead>
                        <tbody id="bookings-body">
                            <tr>
                                <td colspan="5">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Slots Management -->
            <section class="admin-card">
                <h2>Manage Slots</h2>
                <p style="margin-bottom: 15px; font-size: 0.9rem; color: #666;">Toggle slots to manually block them from
                    users.</p>
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="slots-body">
                            <tr>
                                <td colspan="3">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>

    <script src="/js/admin.js"></script>
</body>

</html>
